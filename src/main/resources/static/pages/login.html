<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SyncWave Login</title>

    <link
        rel="stylesheet"
        href="../css/auth.css"
    >

</head>

<body>

<div class="container">

    <div class="card">

        <h1>SyncWave</h1>

        <p>Listen together, stay connected</p>

        <form onsubmit="login(event)">

            <input
                type="email"
                id="loginEmail"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="bottom-text">

            Don't have an account?

            <a href="signup.html">
                Signup
            </a>

        </div>

    </div>

</div>

<script src="../js/auth.js"></script>

</body>
</html>
