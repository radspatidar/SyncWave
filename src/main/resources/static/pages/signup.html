<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SyncWave Signup</title>

    <link rel="stylesheet" href="../css/auth.css" >
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body>

<div class="container">

        <div class="card">

    <div class="logo-section">

        <div class="logo-icon">
            <i class="fa-solid fa-music"></i>
        </div>

        <h1>SyncWave</h1>

    </div>

    <div class="tabs">

        <button type="button" class="tab" onclick="window.location.href='login.html'"> Login </button>

        <button type="button" class="tab active" > Sign Up </button>

    </div>

    <form onsubmit="signup(event)">

        <label>Full Name</label>

        <div class="input-group">

            <i class="fa-regular fa-user"></i>

            <input type="text" id="username" placeholder="Enter your name" required>   

        </div>

        <label>Email</label>

        <div class="input-group">

            <i class="fa-regular fa-envelope"></i>

            <input type="email" id="signupEmail" placeholder="Enter your email" required>

        </div>

        <label>Password</label>

        <div class="input-group">

            <i class="fa-solid fa-lock"></i>

            <input type="password" id="signupPassword" placeholder="Enter your password" required>

        </div>
 
        <button type="submit" class="login-btn"> Create Account </button>
       
    </form>

    <button class="google-btn">

        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">

        Continue with Google

    </button>

    <div class="bottom-text">

        Already have an account?

        <a href="login.html"> Login </a>

    </div>

</div>
    </div>



<script src="../js/auth.js"></script>

</body>
</html>
