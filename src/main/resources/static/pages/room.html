<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" >

    <title>SyncWave Room</title>

    <link rel="stylesheet" href="../css/room.css">

</head>

<body>

<div class="room-layout">

    <div class="sidebar">

        <div class="logo-section">
            <div class="logo-icon">🎵</div>

            <div>
                <h2>SyncWave</h2>
                <p>Listening together</p>
            </div>
        </div>

        <div class="room-info-card">
            <h4>ROOM CODE</h4>
            <div id="roomDisplay"></div>
        </div>

        <div class="members-section">

            <h4>👥 MEMBERS</h4>

            <div id="membersList"></div>

        </div>
        
        <button class="library-btn" onclick="openSongLibrary()"> 🎵 Song Library </button>

        <button class="leave-btn" onclick="leaveRoom()"> Leave Room </button>

    </div>

  
    <div class="main-content">
    
        <div class="content-card">

            <h4>SEARCH SONGS</h4>

            <div class="song-search">

                <input type="text" id="searchInput" placeholder="Search by song title...">

                <button onclick="searchSongs()"> Search </button>

            </div>

            <div id="searchResults"></div>

        </div>
		
		<div class="audio-player-section">

    		<div class="player-wrapper">

        	<audio id="audioPlayer" controls></audio>

    	</div>

	</div>

       
    <div class="content-card">
		<div class="queue-header">

        	<h2>🎶 Song Queue</h2>

            <button id="repeatBtn" onclick="toggleRepeat()"> 🔁 Repeat OFF </button>

        </div>

        <div id="queueList"></div>

     </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script src="/js/api.js"></script>

<script src="../js/room.js"></script>

</body>
</html>
